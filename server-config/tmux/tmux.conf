##### Server tmux — simple & reliable #####
set -g base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix: Ctrl-a (easier over SSH than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits keep cwd
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane move / resize
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

# Status
set -g status-position bottom
set -g status-style bg=default,fg=colour245
set -g status-left ''
set -g status-right ' #H | %H:%M '
set -g status-right-style bg=colour238,fg=colour250,bold

setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '
setw -g window-status-current-style bg=colour250,fg=colour0,bold

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour250
