# Alacritty 0.13.x (Ubuntu) uses top-level keys.
# Alacritty 0.14+ prefers [general] — keep this layout for Ubuntu apt.
import = [
  "./color.toml",
  "./layout.toml",
  "./typography.toml",
  "./mouse.toml",
  "./key-binding.toml"
]
live_config_reload = true

[cursor]
thickness = 0.15
unfocused_hollow = true

[cursor.style]
blinking = "Off"
shape = "Block"

[cursor.vi_mode_style]
blinking = "On"
shape = "Block"

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
